<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Kron Wealth</title>
    <script>
      // GitHub Pages SPA redirect
      // Stores the current path in sessionStorage and redirects to index.html
      // The script in index.html restores the URL via history.replaceState
      sessionStorage.redirect = location.href;
      location.replace(
        location.origin + '/Kron-Wealth/' +
        '?/' + location.pathname.replace('/Kron-Wealth/', '')
      );
    </script>
  </head>
  <body></body>
</html>
